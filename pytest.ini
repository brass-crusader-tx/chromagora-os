[pytest]
testpaths =
    apps/api/tests
    apps/api/chromagora_api/tests
    tests
python_files = test_*.py
python_functions = test_*
pythonpath =
    apps/api
    packages/schemas
    packages/shared
    packages/config
    apps/workers
addopts = --import-mode=importlib -m "not live"
markers =
    live: requires a configured remote Supabase project and mutates live data

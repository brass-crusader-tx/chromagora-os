[pytest]
testpaths =
    tests
    chromagora_api/tests
python_files = test_*.py
python_functions = test_*
pythonpath =
    .
    ../../packages/schemas
    ../../apps/workers
addopts = --import-mode=importlib -m "not live"
markers =
    live: requires a configured remote Supabase project and mutates live data
